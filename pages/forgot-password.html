<!doctype html>
<html lang="en" data-theme="light" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | beatCode</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome (Icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Theme Toggles CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/theme-toggles@4.10.1/css/around.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/common.css" />
    <style>
      .auth-section {
        min-height: calc(100vh - 72px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background: var(--bg-main);
        position: relative;
        overflow: hidden;
      }

      .auth-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 450px;
        box-shadow: var(--shadow-lg);
        position: relative;
        z-index: 1;
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-icon {
        width: 64px;
        height: 64px;
        background: rgba(31, 111, 235, 0.1);
        color: var(--primary);
        border-radius: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.75rem;
        margin: 0 auto 1.5rem;
      }

      .auth-title {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 0.5rem;
      }

      .auth-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .form-label {
        font-weight: 600;
        font-size: 0.88rem;
        color: var(--text-main);
        margin-bottom: 0.5rem;
      }

      .form-control {
        background-color: var(--bg-soft);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        transition: all 0.2s ease;
      }

      .form-control:focus {
        background-color: var(--card-bg);
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.1);
        color: var(--text-main);
      }

      .btn-auth {
        padding: 0.75rem;
        font-weight: 700;
        border-radius: 0.75rem;
        width: 100%;
        margin-top: 1rem;
        transition: all 0.3s ease;
      }

      .back-to-login {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: color 0.2s ease;
      }

      .back-to-login:hover {
        color: var(--primary);
      }

      .bg-blur-circle {
        position: absolute;
        width: 400px;
        height: 400px;
        background: var(--primary);
        filter: blur(120px);
        opacity: 0.05;
        z-index: 0;
        border-radius: 50%;
      }

      .circle-1 {
        top: -100px;
        right: -100px;
      }
      .circle-2 {
        bottom: -100px;
        left: -100px;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top beat-nav shadow-sm">
      <div class="container">
        <a
          class="navbar-brand d-flex align-items-center gap-2 brand-logo"
          href="../index.html"
        >
          <i class="fa-solid fa-code brand-icon"></i>
          <span class="brand-text">beatCode</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
            <!-- <li class="nav-item">
                        <a class="nav-link" href="pages/problemset.html">Problemset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/contests.html">Contests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/leaderboard.html">Leaderboard</a>
                    </li> -->
            <li class="nav-item theme-switch-wrapper d-flex align-items-center">
              <button
                id="themeToggle"
                class="theme-toggle btn btn-link p-0 border-0 ms-2"
                style="color: var(--text-main)"
                type="button"
                title="Toggle theme"
                aria-label="Toggle theme"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                  width="1.5em"
                  height="1.5em"
                  fill="currentColor"
                  class="theme-toggle__around"
                  viewBox="0 0 32 32"
                >
                  <clipPath id="theme-toggle__around__cutout">
                    <path d="M0 0h42v30a1 1 0 00-16 13H0Z" />
                  </clipPath>
                  <g clip-path="url(#theme-toggle__around__cutout)">
                    <circle cx="16" cy="16" r="8.4" />
                    <g>
                      <circle cx="16" cy="3.3" r="2.3" />
                      <circle cx="27" cy="9.7" r="2.3" />
                      <circle cx="27" cy="22.3" r="2.3" />
                      <circle cx="16" cy="28.7" r="2.3" />
                      <circle cx="5" cy="22.3" r="2.3" />
                      <circle cx="5" cy="9.7" r="2.3" />
                    </g>
                  </g>
                </svg>
              </button>
            </li>
            <li class="nav-item auth-buttons d-flex gap-2">
              <button
                type="button"
                class="btn btn-outline-primary btn-sm px-4 rounded-3"
                data-bs-toggle="modal"
                data-bs-target="#loginModal"
              >
                Login
              </button>
              <button
                type="button"
                class="btn btn-primary btn-sm px-4 rounded-3"
                data-bs-toggle="modal"
                data-bs-target="#signupModal"
              >
                Sign Up
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="auth-section mt-auto">
      <div class="bg-blur-circle circle-1"></div>
      <div class="bg-blur-circle circle-2"></div>

      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-icon">
            <i class="fa-solid fa-key"></i>
          </div>
          <h1 class="auth-title">Forgot Password?</h1>
          <p class="auth-subtitle">
            No worries! Enter your email and we'll send you instructions to
            reset your password.
          </p>
        </div>

        <form id="forgotPasswordForm">
          <div class="mb-4">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="name@example.com"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-auth">
            Send Reset Link
          </button>

          <a href="../index.html" class="back-to-login">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Homapage
          </a>
        </form>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="footer py-4 border-top mt-auto"
      style="background-color: var(--footer-bg)"
    >
      <div class="container text-center">
        <div
          class="d-flex align-items-center justify-content-center gap-2 mb-3"
        >
          <i class="fa-solid fa-code fs-4"></i>
          <span class="fw-bold fs-5">beatCode</span>
        </div>
        <p class="text-muted mb-0">
          Developed by
          <span class="fw-bold text-primary">অরুণ প্রাতের তরুণ দল</span>
        </p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme Toggle Script -->
    <script>
      const themeToggle = document.getElementById("themeToggle");
      const html = document.documentElement;

      // Check for saved theme or default to light
      const savedTheme = localStorage.getItem("theme") || "light";
      html.setAttribute("data-theme", savedTheme);
      html.setAttribute("data-bs-theme", savedTheme);

      themeToggle.addEventListener("click", () => {
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        html.setAttribute("data-bs-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      });

      // Form handling (mock)
      document
        .getElementById("forgotPasswordForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const btn = e.target.querySelector("button");
          const email = document.getElementById("email").value;

          btn.disabled = true;
          btn.innerHTML =
            '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';

          setTimeout(() => {
            alert(`Reset instructions sent to ${email} (Mock)`);
            btn.disabled = false;
            btn.innerHTML = "Send Reset Link";
          }, 1500);
        });
    </script>
  </body>
</html>
