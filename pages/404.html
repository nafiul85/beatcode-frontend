<!DOCTYPE html>
<html lang="en" data-theme="light" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | beatCode</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Theme Toggles CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/theme-toggles@4.10.1/css/around.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/common.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top beat-nav shadow-sm" style="backdrop-filter: blur(10px);">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 brand-logo" href="../index.html">
                <i class="fa-solid fa-code brand-icon"></i>
                <span class="brand-text">beatCode</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                    <li class="nav-item theme-switch-wrapper d-flex align-items-center">
                        <button
                          id="themeToggle"
                          class="theme-toggle btn btn-link p-0 border-0 ms-2"
                          style="color: var(--text-main);"
                          type="button"
                          title="Toggle theme"
                          aria-label="Toggle theme"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                            width="1.5em"
                            height="1.5em"
                            fill="currentColor"
                            class="theme-toggle__around"
                            viewBox="0 0 32 32"
                          >
                            <clipPath id="theme-toggle__around__cutout">
                              <path d="M0 0h42v30a1 1 0 00-16 13H0Z" />
                            </clipPath>
                            <g clip-path="url(#theme-toggle__around__cutout)">
                              <circle cx="16" cy="16" r="8.4" />
                              <g>
                                <circle cx="16" cy="3.3" r="2.3" />
                                <circle cx="27" cy="9.7" r="2.3" />
                                <circle cx="27" cy="22.3" r="2.3" />
                                <circle cx="16" cy="28.7" r="2.3" />
                                <circle cx="5" cy="22.3" r="2.3" />
                                <circle cx="5" cy="9.7" r="2.3" />
                              </g>
                            </g>
                          </svg>
                        </button>
                    </li>
                    <li class="nav-item auth-buttons d-flex gap-2">
                        <a href="../index.html" class="btn btn-outline-primary btn-sm px-4 rounded-3">Login</a>
                        <a href="../index.html" class="btn btn-primary btn-sm px-4 rounded-3">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 404 Hero Section -->
    <main class="flex-grow-1 hero-section position-relative overflow-hidden d-flex align-items-center" style="padding-top: 8rem; padding-bottom: 4rem;">
        <div class="bg-pattern" style="opacity: 0.5;"></div>
        <div class="container position-relative z-1 text-center py-5 animate-slide-up">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <!-- Terminal Window Style for 404 -->
                    <div class="preview-box border rounded-3 shadow-md overflow-hidden mb-5 mx-auto hover-scale d-flex flex-column" style="background-color: var(--card-bg); max-width: 600px;">
                        <div class="terminal-header">
                            <div class="terminal-dot dot-red"></div>
                            <div class="terminal-dot dot-yellow"></div>
                            <div class="terminal-dot dot-green"></div>
                            <div class="ms-3 text-muted" style="font-family: 'Fira Code', monospace; font-size: 0.75rem;">error.log</div>
                        </div>
                        <div class="p-5 text-center flex-grow-1 d-flex flex-column justify-content-center align-items-center">
                            
                            <h1 class="gradient-text display-1 fw-bold mb-2" style="font-size: 6rem; font-weight: 900;">404</h1>
                            <h3 class="fw-bold mb-3" style="color: var(--text-main);">Page Not Found</h3>
                            <p class="text-muted mb-4 small" style="font-family: 'Fira Code', monospace;">
                                > The page you are looking for is not available right now.
                            </p>
                            <div class="d-flex justify-content-center flex-wrap gap-2 mt-4">
                                <a href="../index.html" class="btn btn-primary badge px-4 py-2 fw-semibold text-decoration-none hover-scale" style="color: #fff; border-radius: 8px; font-size: 0.9rem;">
                                    <i class="fa-solid fa-arrow-left me-2"></i> Return Home
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer py-4 border-top mt-auto" style="background-color: var(--footer-bg);">
        <div class="container text-center">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                <i class="fa-solid fa-code fs-4"></i>
                <span class="fw-bold fs-5">beatCode</span>
            </div>
            <p class="text-muted mb-0">Developed by <span class="fw-bold text-primary">অরুণ প্রাতের তরুণ দল</span></p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const documentElement = document.documentElement;

        // Initialize theme from localStorage or fallback to default
        const savedTheme = localStorage.getItem('beatCode-theme') || 'light';
        documentElement.setAttribute('data-theme', savedTheme);
        documentElement.setAttribute('data-bs-theme', savedTheme);
        if (savedTheme === 'dark') {
            themeToggle.classList.add('theme-toggle--toggled');
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            documentElement.setAttribute('data-theme', newTheme);
            documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('beatCode-theme', newTheme);
            themeToggle.classList.toggle('theme-toggle--toggled');
        });
    </script>
</body>
</html>
