<!DOCTYPE html>
<html lang="en" data-theme="light" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | beatCode</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Theme Toggles CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/theme-toggles@4.10.1/css/around.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .auth-section {
            min-height: calc(100vh - 72px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 5.5rem 1rem 2rem;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 850px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-icon {
            width: 64px;
            height: 64px;
            background: rgba(31, 111, 235, 0.1);
            color: var(--primary);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin: 0 auto 1.5rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: var(--bg-soft);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: var(--card-bg);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.1);
            color: var(--text-main);
        }

        .otp-input-group {
            display: flex;
            gap: 0.5rem;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .otp-field {
            width: 50px;
            height: 54px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 0.75rem;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
        }

        .btn-auth {
            padding: 0.75rem;
            font-weight: 700;
            border-radius: 0.75rem;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .bg-blur-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.05;
            z-index: 0;
            border-radius: 50%;
        }

        .circle-1 { top: -100px; right: -100px; }
        .circle-2 { bottom: -100px; left: -100px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .password-requirements {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.2rem;
        }

        .requirement-item.met { color: var(--success); }
        .requirement-item.met i { content: "\f00c"; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top beat-nav shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 brand-logo" href="../index.html">
                <i class="fa-solid fa-code brand-icon"></i>
                <span class="brand-text">beatCode</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-3">
                    <!-- <li class="nav-item">
                        <a class="nav-link" href="pages/problemset.html">Problemset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/contests.html">Contests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/leaderboard.html">Leaderboard</a>
                    </li> -->
                    <li class="nav-item theme-switch-wrapper d-flex align-items-center">
                        <button
                          id="themeToggle"
                          class="theme-toggle btn btn-link p-0 border-0 ms-2"
                          style="color: var(--text-main);"
                          type="button"
                          title="Toggle theme"
                          aria-label="Toggle theme"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                            width="1.5em"
                            height="1.5em"
                            fill="currentColor"
                            class="theme-toggle__around"
                            viewBox="0 0 32 32"
                          >
                            <clipPath id="theme-toggle__around__cutout">
                              <path d="M0 0h42v30a1 1 0 00-16 13H0Z" />
                            </clipPath>
                            <g clip-path="url(#theme-toggle__around__cutout)">
                              <circle cx="16" cy="16" r="8.4" />
                              <g>
                                <circle cx="16" cy="3.3" r="2.3" />
                                <circle cx="27" cy="9.7" r="2.3" />
                                <circle cx="27" cy="22.3" r="2.3" />
                                <circle cx="16" cy="28.7" r="2.3" />
                                <circle cx="5" cy="22.3" r="2.3" />
                                <circle cx="5" cy="9.7" r="2.3" />
                              </g>
                            </g>
                          </svg>
                        </button>
                    </li>
                    <li class="nav-item auth-buttons d-flex gap-2">
                        <button type="button" class="btn btn-outline-primary btn-sm px-4 rounded-3" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
                        <button type="button" class="btn btn-primary btn-sm px-4 rounded-3" data-bs-toggle="modal" data-bs-target="#signupModal">Sign Up</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="auth-section">
        <div class="bg-blur-circle circle-1"></div>
        <div class="bg-blur-circle circle-2"></div>
        
        <div class="auth-card mt-auto">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 class="auth-title">Set New Password</h1>
                <p class="auth-subtitle">We sent a 6-digit code to your email. Enter it below along with your new password.</p>
            </div>

            <form id="setPasswordForm">
                <div class="mb-4 mt-2">
                    <label class="form-label d-block text-center mb-3">Verification Code</label>
                    <div class="otp-input-group justify-content-center">
                        <input type="text" class="form-control otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                        <input type="text" class="form-control otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                        <input type="text" class="form-control otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                        <input type="text" class="form-control otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                        <input type="text" class="form-control otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                        <input type="text" class="form-control otp-field" maxlength="1" pattern="\d*" inputmode="numeric">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label for="newPassword" class="form-label">New Password</label>
                        <div class="password-toggle">
                            <input type="password" class="form-control" id="newPassword" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" id="toggleP1"></i>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="password-toggle">
                            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye" id="toggleP2"></i>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-auth">Reset Password</button>
                
                <div class="text-center mt-4">
                    <p class="text-muted small">Didn't receive code? <a href="forgot-password.html" class="text-primary fw-bold text-decoration-none">Resend Code</a></p>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer py-4 border-top mt-auto" style="background-color: var(--footer-bg);">
        <div class="container text-center">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                <i class="fa-solid fa-code fs-4"></i>
                <span class="fw-bold fs-5">beatCode</span>
            </div>
            <p class="text-muted mb-0">Developed by <span class="fw-bold text-primary">অরুণ প্রাতের তরুণ দল</span></p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Theme Toggle & Form Script -->
    <script>
        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        html.setAttribute('data-bs-theme', savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // OTP Input Auto-focus
        const otpFields = document.querySelectorAll('.otp-field');
        otpFields.forEach((field, index) => {
            field.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpFields.length - 1) {
                    otpFields[index + 1].focus();
                }
            });
            field.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpFields[index - 1].focus();
                }
            });
        });

        // Password Toggle
        const setupToggle = (btnId, inputId) => {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            btn.addEventListener('click', () => {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                btn.classList.toggle('fa-eye');
                btn.classList.toggle('fa-eye-slash');
            });
        };
        setupToggle('toggleP1', 'newPassword');
        setupToggle('toggleP2', 'confirmPassword');

        // Form Submission
        document.getElementById('setPasswordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const otp = Array.from(otpFields).map(f => f.value).join('');

            if (otp.length < 6) {
                alert('Please enter the full 6-digit verification code.');
                return;
            }

            if (pass !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Resetting...';

            setTimeout(() => {
                alert('Password reset successfully! (Mock)');
                window.location.href = '../index.html';
            }, 2000);
        });
    </script>
</body>
</html>
